<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vault - Ajouter une entrée</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
  <script defer src="/static/js/app.js"></script>
</head>
<body class="h-full">
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">Vault</div>
      <nav class="sidebar-nav">
        <a href="/dashboard" class="nav-link">Dashboard</a>
        <a href="/add" class="nav-link active">Ajouter un mot de passe</a>
        <a href="/add#generator" class="nav-link">Générateur</a>
        <a href="/settings" class="nav-link">Paramètres</a>
        <button id="lock-btn" type="button" class="nav-link nav-link-danger">Verrouiller</button>
      </nav>
    </aside>

    <main class="main">
      <header class="main-header">
        <div>
          <h1 class="main-title">Ajouter une entrée</h1>
          <p class="main-subtitle">Créez un nouvel identifiant chiffré dans votre coffre local.</p>
        </div>
      </header>

      <section class="card">
        <form id="add-entry-form" class="flex flex-col gap-4">
          <div>
            <label for="site">Site / Application</label>
            <input id="site" name="site" type="text" required class="input" />
          </div>
          <div>
            <label for="username">Identifiant</label>
            <input id="username" name="username" type="text" required class="input" />
          </div>
          <div>
            <label for="password">Mot de passe</label>
            <div class="relative">
              <input id="password" name="password" type="password" required class="input input-lg" />
              <button type="button" id="toggle-password" class="btn-icon absolute inset-y-0 right-2 my-auto">Montrer</button>
            </div>
            <div class="strength-bar">
              <div id="password-strength-fill" class="strength-fill strength-0"></div>
            </div>
            <p id="password-strength-label" class="mt-2 text-xs" style="color:#64748b;"></p>
          </div>
          <div>
            <label for="notes">Notes (optionnel)</label>
            <textarea id="notes" name="notes" rows="3" class="input" style="resize:vertical;"></textarea>
          </div>

          <div id="generator" class="flex gap-2 items-center">
            <button type="button" id="generate-password-btn" class="btn btn-secondary">Générer un mot de passe</button>
            <input id="gen-length" type="number" min="8" max="64" value="20" class="input" style="max-width:5rem;" />
            <label style="font-size:0.8rem; color:#94a3b8;">
              <input id="gen-special" type="checkbox" checked /> Caractères spéciaux
            </label>
          </div>

          <div class="flex justify-end gap-2">
            <a href="/dashboard" class="btn btn-secondary">Annuler</a>
            <button type="submit" class="btn btn-primary">Enregistrer</button>
          </div>
        </form>
      </section>
    </main>
  </div>

  <div id="toast-root" class="toast-container"></div>
</body>
</html>
